## These are sample configurations for the FHIR service.
## Update the values as per your environment setup.
exportServiceUrl = "http://localhost:8090/bulk/export"
serverBaseUrl = "http://localhost:8081"

## Resource types permitted for $export and $davinci-data-export operations.
## Based on DaVinci PDex payer-to-payer spec: US Core clinical resources + PDex claims/encounter types.
## Remove types you do not support or wish to restrict.
allowedExportResourceTypes = [
    "AllergyIntolerance", "CarePlan", "CareTeam", "Condition", "Consent",
    "Coverage", "Device", "DiagnosticReport", "DocumentReference", "Encounter",
    "ExplanationOfBenefit", "Goal", "Immunization", "MedicationDispense",
    "MedicationRequest", "Observation", "Patient", "Practitioner", "PractitionerRole",
    "Procedure", "Provenance", "RelatedPerson", "ServiceRequest"
]

## Initial sample data is dynamically retrieved from this GitHub repository.
sampleDataGithubUrl = "http://localhost:9091/data"

baseUrl = "http://localhost:9090/fhir/r4"

[ballerina.http]
defaultListenerPort = 8080

## Following configurations are used to build the capability statement and smart configuration.
[configs]
discoveryEndpoint = "https://api.asgardeo.io/t/wso2healthcare/oauth2/token/.well-known/openid-configuration"
[configs.smartConfiguration]
issuer = "<issuer>"
jwksUri = "<jwksUri>"
authorizationEndpoint = "<authorizationEndpoint>"
tokenEndpoint = "<tokenEndpoint>"
codeChallengeMethodsSupported = ["S256"]
grantTypesSupported = ["authorization_code"]
capabilities = ["launch-ehr"]

[configFHIRServer]
status = "active"
kind = "instance"
implementationDescription = "FHIR server"
fhirVersion = "4.0.1"
format = ["json"]

[configRest]
mode = "server"

[ballerinax.health.fhir.r4.parser]
validateAgainstProfile=false